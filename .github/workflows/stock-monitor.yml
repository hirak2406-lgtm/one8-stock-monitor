name: one8 stock monitor

on:
  schedule:
    # Every 30 minutes. Chosen to stay within GitHub's free 2,000 Action-min/month for
    # private repos (~1,440 min/month, with margin). To go faster (e.g. every 5 min),
    # make the repo public — Actions is then unlimited & free.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}        # allow manual runs from the Actions tab

# Allow the job to push the updated state.json back to the repo.
permissions:
  contents: write

concurrency:
  group: stock-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run stock check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Watches both Seam XVIII Signature colourways (all sizes) by default.
          # Override here to change which products are watched:
          # PRODUCT_HANDLES: "seam-xviii-signature-mens-white,seam-xviii-signature-mens-red"
        run: python3 monitor.py

      - name: Persist state (only if it changed)
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "stock-monitor-bot"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update stock state [skip ci]"
            git pull --rebase --autostash origin main || true
            git push
          else
            echo "No state change to commit."
          fi

      # Backstop: if ANY step above failed (crash, bad deploy, Telegram outage,
      # push error), ping the phone directly so a breakage can't go unnoticed.
      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TEXT="⚠️ one8 stock monitor FAILED
          A scheduled run errored — stock checking may be paused until it's fixed.
          Open the logs: ${RUN_URL}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TEXT}" >/dev/null || true
