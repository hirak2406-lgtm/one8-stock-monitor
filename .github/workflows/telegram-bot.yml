name: one8 chat bot

# Answers "check <product>" messages you send the Telegram bot, searching one8.com.
# Runs every 5 min, so replies arrive within ~5 minutes (works with your Mac off).

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: telegram-bot          # never let two pollers consume updates at once
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Answer pending messages
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 bot_poll.py

      - name: Persist read-offset (only if it changed)
        run: |
          if [ -n "$(git status --porcelain telegram_offset.json)" ]; then
            git config user.name "stock-monitor-bot"
            git config user.email "actions@users.noreply.github.com"
            git add telegram_offset.json
            git commit -m "chore: advance telegram offset [skip ci]"
            git pull --rebase --autostash origin main || true
            git push
          else
            echo "No offset change to commit."
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TEXT="⚠️ one8 chat bot FAILED
          The message-answering job errored. Stock alerts are unaffected.
          Logs: ${RUN_URL}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TEXT}" >/dev/null || true
